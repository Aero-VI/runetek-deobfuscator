name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build fat JAR
        run: mvn clean package -q -DskipTests

      - name: Generate version tag
        id: version
        run: |
          VERSION="0.1.0-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename artifact
        run: |
          cp target/runetek-deobfuscator-0.1.0-SNAPSHOT.jar \
             runetek-deobfuscator-${{ steps.version.outputs.version }}.jar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "RuneTek Deobfuscator ${{ steps.version.outputs.version }}"
          body: |
            Automated build from `main` branch.

            **Usage:**
            ```
            java -jar runetek-deobfuscator-${{ steps.version.outputs.version }}.jar <input.jar> <output-dir> [options]
            ```

            **Options:**
            - `--revision 508` — Use RuneTek 4 profile
            - `--decompile` — Decompile to Java source
            - `--mappings mappings.json` — Export name mappings
            - `--output-jar deobfuscated.jar` — Write modified JAR
            - `--verbose` — Verbose output

            See [README](https://github.com/Aero-VI/runetek-deobfuscator#readme) for full documentation.
          files: |
            runetek-deobfuscator-${{ steps.version.outputs.version }}.jar
          generate_release_notes: true
